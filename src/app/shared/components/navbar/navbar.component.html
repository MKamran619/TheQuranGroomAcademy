<header class="sticky top-0 z-50 bg-white border-b" style="border-color:#e8e0d0; box-shadow: 0 2px 12px rgba(15,52,96,0.07);">
  <!-- Gold top line -->
  <div class="h-0.5 w-full" style="background: linear-gradient(90deg, #0f3460, #c9a227, #059669);"></div>

  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between" style="height:72px;">

    <!-- Logo -->
    <a routerLink="/" class="group hover:opacity-90 transition-opacity duration-200">
      <app-logo theme="light" [size]="40"/>
    </a>

    <!-- Desktop Links -->
    <ul class="hidden lg:flex items-center gap-1">
      @for (link of navLinks(); track link.path) {
        <li>
          <a [routerLink]="link.path"
             routerLinkActive="nav-active"
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             #rla="routerLinkActive"
             class="relative px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
             [style]="rla.isActive ? 'color:#0f3460; font-weight:600;' : 'color:#4a5568;'"
             onmouseover="if(!this.classList.contains('nav-active')){this.style.color='#0f3460';this.style.background='rgba(15,52,96,0.06)'}"
             onmouseout="if(!this.classList.contains('nav-active')){this.style.color='#4a5568';this.style.background='transparent'}">
            {{ link.label }}
            @if (rla.isActive) {
              <span class="absolute bottom-0 left-3 right-3 h-0.5 rounded-full" style="background:#c9a227;"></span>
            }
          </a>
        </li>
      }
    </ul>

    <!-- Desktop Right -->
    <div class="hidden lg:flex items-center gap-3">
      <a [href]="'tel:' + phoneHref()"
         class="flex items-center gap-2 text-sm font-medium px-3 py-2 rounded-lg transition-colors"
         style="color:#6b7280;"
         onmouseover="this.style.color='#0f3460'"
         onmouseout="this.style.color='#6b7280'">
        <svg class="w-4 h-4" fill="none" stroke="#c9a227" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        {{ phone() }}
      </a>
      <a [routerLink]="ctaLink()"
         class="text-white text-sm font-bold px-5 py-2.5 rounded-xl transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg"
         style="background: linear-gradient(135deg, #0f3460, #1a5276); box-shadow: 0 4px 14px rgba(15,52,96,0.3);">
        {{ ctaLabel() }}
      </a>
    </div>

    <!-- Mobile hamburger -->
    <button (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()"
            class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl transition-colors"
            style="color:#0f3460;"
            onmouseover="this.style.background='rgba(15,52,96,0.06)'"
            onmouseout="this.style.background='transparent'">
      @if (!menuOpen()) {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      } @else {
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      }
    </button>
  </nav>

  <!-- Mobile Drawer -->
  @if (menuOpen()) {
    <div class="lg:hidden border-t bg-white" style="border-color:#e8e0d0;">
      <div class="px-4 py-4 space-y-1">
        @for (link of navLinks(); track link.path) {
          <a [routerLink]="link.path" (click)="closeMenu()"
             routerLinkActive="mobile-nav-active"
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             #mrla="routerLinkActive"
             class="flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all"
             [style]="mrla.isActive ? 'color:#0f3460; background:rgba(15,52,96,0.06); font-weight:600;' : 'color:#4a5568;'"
             onmouseover="this.style.background='rgba(15,52,96,0.06)'"
             onmouseout="if(!this.classList.contains('mobile-nav-active')){this.style.background='transparent'}">
            {{ link.label }}
            @if (mrla.isActive) {
              <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:#c9a227;"></span>
            }
          </a>
        }
        <div class="pt-3 mt-3 border-t space-y-2" style="border-color:#e8e0d0;">
          <a routerLink="/contact" (click)="closeMenu()"
             class="block text-center text-white font-bold px-4 py-3.5 rounded-xl"
             style="background: linear-gradient(135deg, #0f3460, #1a5276);">
            Free Trial Class
          </a>
        </div>
      </div>
    </div>
  }
</header>
