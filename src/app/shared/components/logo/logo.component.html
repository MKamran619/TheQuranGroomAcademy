<div class="flex items-center gap-3 select-none">

  <!-- ─── SVG Mark: Open Book + Mosque ─── -->
  <svg [attr.width]="size" [attr.height]="size" viewBox="0 0 56 56"
       fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="bookGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
        <stop offset="0%"  stop-color="#0f3460"/>
        <stop offset="100%" stop-color="#1a5276"/>
      </linearGradient>
    </defs>

    <!-- Open book base - left page -->
    <path d="M6 38 Q6 42 10 42 L27 40 L27 22 Q20 22 14 25 Q8 28 6 34 Z"
          fill="url(#bookGrad)" opacity="0.95"/>
    <!-- Open book base - right page -->
    <path d="M50 38 Q50 42 46 42 L29 40 L29 22 Q36 22 42 25 Q48 28 50 34 Z"
          fill="url(#bookGrad)" opacity="0.85"/>
    <!-- Book spine / center line -->
    <line x1="28" y1="22" x2="28" y2="41" stroke="#c9a227" stroke-width="1.5"/>
    <!-- Book pages lines - left -->
    <line x1="14" y1="30" x2="26" y2="28.5" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="13" y1="33" x2="26" y2="31.5" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="13" y1="36" x2="26" y2="35" stroke="white" stroke-width="0.6" opacity="0.3"/>
    <!-- Book pages lines - right -->
    <line x1="42" y1="30" x2="30" y2="28.5" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="43" y1="33" x2="30" y2="31.5" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="43" y1="36" x2="30" y2="35" stroke="white" stroke-width="0.6" opacity="0.3"/>

    <!-- Mosque dome (center) -->
    <path d="M24 22 Q24 13 28 11 Q32 13 32 22 Z" fill="url(#bookGrad)"/>
    <!-- Dome top bulb -->
    <ellipse cx="28" cy="11" rx="2.5" ry="3" fill="url(#bookGrad)"/>

    <!-- Left minaret -->
    <rect x="17" y="19" width="3.5" height="9" rx="1" fill="url(#bookGrad)"/>
    <path d="M17 19 Q18.75 15 20.5 19 Z" fill="url(#bookGrad)"/>
    <circle cx="18.75" cy="15" r="1.2" fill="#c9a227"/>

    <!-- Right minaret -->
    <rect x="35.5" y="19" width="3.5" height="9" rx="1" fill="url(#bookGrad)"/>
    <path d="M35.5 19 Q37.25 15 39 19 Z" fill="url(#bookGrad)"/>
    <circle cx="37.25" cy="15" r="1.2" fill="#c9a227"/>

    <!-- Mosque door arch -->
    <path d="M25.5 22 L25.5 27 Q25.5 29 28 29 Q30.5 29 30.5 27 L30.5 22 Z" fill="white" opacity="0.25"/>

    <!-- Crescent + star above dome -->
    <path d="M26.5 7.5 A3.5 3.5 0 1 1 29.5 5.5 A2.5 2.5 0 1 0 26.5 7.5 Z" fill="#c9a227"/>
    <polygon points="31,4 31.5,5.5 33,5.5 31.8,6.5 32.3,8 31,7 29.7,8 30.2,6.5 29,5.5 30.5,5.5"
             fill="#c9a227" transform="scale(0.7) translate(14, 1)"/>
  </svg>

  <!-- ─── Wordmark ─── -->
  <div class="flex flex-col leading-none">
    <span class="font-display font-bold leading-tight tracking-tight"
          [ngClass]="theme === 'dark' ? 'text-white' : 'text-gray-900'"
          [style.font-size.px]="size * 0.38">The Quran Groom</span>
    <span class="uppercase tracking-[0.2em] font-semibold mt-0.5"
          [ngClass]="theme === 'dark' ? 'text-emerald-400' : 'text-emerald-700'"
          [style.font-size.px]="size * 0.175">Academy</span>
  </div>

</div>
