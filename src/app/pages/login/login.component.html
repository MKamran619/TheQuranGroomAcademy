<div class="min-h-screen bg-gradient-to-br from-emerald-950 to-teal-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-block hover:opacity-90 transition-opacity duration-200">
        <app-logo theme="dark" [size]="42"/>
      </a>
      <p class="text-emerald-300 text-sm mt-3">Sign in to your account</p>
    </div>

    <form (ngSubmit)="submit()" class="bg-white rounded-2xl shadow-2xl p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email or Username</label>
        <input [(ngModel)]="identifier" name="identifier" required type="text" placeholder="you@example.com"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input [(ngModel)]="password" name="password" required type="password" placeholder="••••••••"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 transition" />
      </div>

      @if (error()) {
        <p class="text-red-600 text-sm bg-red-50 rounded-lg px-4 py-3 border border-red-100">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()"
              class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-60 text-white font-bold py-3.5 rounded-xl transition-colors">
        @if (loading()) { Signing in… } @else { Sign In }
      </button>

      <p class="text-center text-sm text-gray-500">
        <a routerLink="/" class="text-emerald-600 hover:underline">← Back to home</a>
      </p>
    </form>
  </div>
</div>
