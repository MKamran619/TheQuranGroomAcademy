<section class="py-24 bg-cream-100">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="text-center mb-16">
      <div class="divider-gold mx-auto mb-4"></div>
      <span class="text-sm font-semibold uppercase tracking-[0.2em]" style="color:#c9a227;">Got Questions?</span>
      <h2 class="font-display text-4xl sm:text-5xl font-bold mt-2" style="color:#0f3460;">
        Frequently Asked <span class="text-gradient">Questions</span>
      </h2>
    </div>

    @if (loading()) {
      <div class="space-y-3">
        @for (s of [1,2,3,4]; track s) {
          <div class="bg-white rounded-2xl border p-5 animate-pulse" style="border-color:#e8e0d0;">
            <div class="h-4 rounded-full w-3/4" style="background:#f3f0ea;"></div>
          </div>
        }
      </div>
    } @else {
      <div class="space-y-3">
        @for (item of items(); track item.id; let i = $index) {
          <div class="bg-white rounded-2xl border overflow-hidden transition-all duration-200"
               [style]="open() === i
                 ? 'border-color:#c9a227; box-shadow: 0 4px 20px rgba(201,162,39,0.12);'
                 : 'border-color:#e8e0d0; box-shadow: 0 2px 8px rgba(15,52,96,0.04);'">
            <button (click)="toggle(i)"
                    class="w-full flex items-center justify-between px-6 py-5 text-left gap-4">
              <span class="font-semibold text-base"
                    [style]="open() === i ? 'color:#0f3460;' : 'color:#2d3748;'">
                {{ item.question }}
              </span>
              <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300"
                   [style]="open() === i
                     ? 'background:#c9a227; color:white; transform:rotate(180deg);'
                     : 'background:#f5efe0; color:#6b7280;'">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
            </button>
            @if (open() === i) {
              <div class="px-6 pb-6 text-sm leading-relaxed border-t pt-4"
                   style="color:#4a5568; border-color:#f5efe0;">
                {{ item.answer }}
              </div>
            }
          </div>
        }
      </div>
    }

    <!-- CTA below FAQs -->
    <div class="mt-12 text-center p-8 rounded-2xl border" style="background:white; border-color:#e8d99a;">
      <p class="text-base font-medium mb-4" style="color:#4a5568;">Still have questions? Our team is happy to help.</p>
      <a routerLink="/contact"
         class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-white text-sm transition-all duration-200 hover:-translate-y-0.5"
         style="background: linear-gradient(135deg, #0f3460, #1a5276); box-shadow: 0 6px 20px rgba(15,52,96,0.25);">
        Contact Us
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
</section>
